<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي - التبصيم</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #c9a227;
            --gold-light: #e8d48b;
            --dark-red: #8b0000;
            --burgundy: #722f37;
            --cream: #f5f0e1;
            --parchment: #f4eed5;
            --dark-brown: #3d2b1f;
            --forest: #1e3d2f;
            --bg: var(--parchment);
            --text: var(--dark-brown);
            --card-bg: var(--cream);
            --sidebar-bg: #2a1a0e;
            --header-bg: linear-gradient(135deg, var(--dark-red), var(--burgundy), var(--dark-red));
            --input-bg: #fff;
            --border: var(--gold);
            --scrollbar-thumb: linear-gradient(var(--gold), var(--dark-red));
        }

        body.dark-mode {
            --bg: #1a1a2e;
            --text: #e0d8c8;
            --card-bg: #16213e;
            --sidebar-bg: #0f0f1a;
            --header-bg: linear-gradient(135deg, #1a0a0a, #2a1020, #1a0a0a);
            --input-bg: #1e2a3a;
            --border: #8b7a40;
            --scrollbar-thumb: linear-gradient(#8b7a40, #4a3020);
        }

        body {
            font-family: 'Amiri', serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        .app-container {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-left: 3px solid var(--gold);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            right: -300px;
            height: 100vh;
            z-index: 1000;
            transition: right 0.3s ease;
            box-shadow: -5px 0 20px rgba(0,0,0,0.5);
        }
        .sidebar.open { right: 0; }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .sidebar-overlay.show { display: block; }

        .sidebar-header {
            padding: 20px;
            border-bottom: 2px solid var(--gold);
            text-align: center;
        }
        .sidebar-header h2 {
            font-family: 'Playfair Display', serif;
            color: var(--gold-light);
            font-size: 18px;
            margin-bottom: 12px;
        }

        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(201,162,39,0.2);
            transition: all 0.2s;
            position: relative;
        }
        .chat-item:hover { background: rgba(201,162,39,0.15); border-color: var(--gold); }
        .chat-item.active { background: rgba(201,162,39,0.2); border-color: var(--gold); }

        .chat-title {
            color: var(--gold-light);
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-left: 25px;
        }
        .chat-date { color: rgba(232,212,139,0.5); font-size: 11px; margin-top: 4px; }
        .delete-chat {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .chat-item:hover .delete-chat { opacity: 1; }

        .sidebar-footer {
            padding: 15px;
            border-top: 2px solid var(--gold);
        }
        .sidebar-footer button {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            font-family: 'Amiri', serif;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid var(--gold);
            transition: all 0.2s;
        }
        .btn-new-chat {
            background: var(--gold);
            color: var(--dark-brown);
            margin-bottom: 8px;
        }
        .btn-new-chat:hover { background: var(--gold-light); }
        .btn-settings {
            background: transparent;
            color: var(--gold);
        }
        .btn-settings:hover { background: rgba(201,162,39,0.2); }

        /* ===== Main Content ===== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .header {
            background: var(--header-bg);
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 3px solid var(--gold);
            position: relative;
            z-index: 10;
        }
        .header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a227' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
        }

        .menu-btn, .dark-toggle-btn, .back-btn {
            background: none;
            border: none;
            color: var(--gold-light);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
            position: relative;
            z-index: 1;
        }
        .menu-btn:hover, .dark-toggle-btn:hover, .back-btn:hover {
            background: rgba(201,162,39,0.2);
        }

        .header-center {
            flex: 1;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .header-center h1 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--gold-light);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .header-center .subtitle {
            color: var(--gold);
            font-size: 13px;
            opacity: 0.8;
        }

        /* ===== Chat Area ===== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--bg);
            transition: background 0.3s;
        }
        .chat-messages::-webkit-scrollbar { width: 8px; }
        .chat-messages::-webkit-scrollbar-track { background: var(--card-bg); }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }

        .message {
            margin-bottom: 16px;
            animation: fadeIn 0.4s ease;
            position: relative;
            padding: 14px 18px;
            border-radius: 18px;
            max-width: 80%;
            line-height: 1.8;
            font-size: 15px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            margin-right: auto;
            background: linear-gradient(135deg, var(--dark-red), var(--burgundy));
            color: var(--cream);
            border: 2px solid var(--gold);
            border-radius: 18px 18px 5px 18px;
        }
        .message.bot {
            margin-left: auto;
            background: var(--card-bg);
            color: var(--text);
            border: 2px solid var(--gold);
            border-radius: 18px 18px 18px 5px;
        }

        .sender {
            display: block;
            font-size: 12px;
            color: var(--gold);
            margin-bottom: 6px;
            font-weight: bold;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
            padding: 4px;
        }
        .message:hover .copy-btn { opacity: 0.7; }
        .copy-btn:hover { opacity: 1 !important; }

        .message.bot h2, .message.bot h3 { color: var(--dark-red); margin: 8px 0 4px; font-size: 16px; }
        .message.bot li { margin: 4px 0; padding-right: 12px; list-style: disc; }

        /* ===== Typing ===== */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 14px 18px;
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 18px 18px 18px 5px;
            width: fit-content;
            margin-left: auto;
            margin-bottom: 16px;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--gold);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.16s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.32s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ===== Input Area ===== */
        .input-area {
            padding: 16px 20px;
            background: var(--card-bg);
            border-top: 2px solid var(--gold);
            display: flex;
            gap: 10px;
            transition: background 0.3s;
        }

        #chatInput {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid var(--gold);
            border-radius: 25px;
            font-family: 'Amiri', serif;
            font-size: 15px;
            background: var(--input-bg);
            color: var(--text);
            outline: none;
            transition: all 0.3s;
            direction: rtl;
        }
        #chatInput:focus { border-color: var(--dark-red); box-shadow: 0 0 12px rgba(139,0,0,0.15); }
        #chatInput::placeholder { color: #999; font-style: italic; }

        .send-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--dark-red), var(--burgundy));
            color: var(--gold-light);
            border: 2px solid var(--gold);
            border-radius: 25px;
            font-family: 'Amiri', serif;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(139,0,0,0.3); }

        /* ===== Quick Questions ===== */
        .quick-questions {
            padding: 14px 20px;
            background: var(--card-bg);
            border-top: 1px solid rgba(201,162,39,0.3);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            transition: background 0.3s;
        }
        .quick-btn {
            padding: 8px 16px;
            background: var(--input-bg);
            border: 1px solid var(--gold);
            color: var(--text);
            border-radius: 20px;
            font-family: 'Amiri', serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            background: var(--dark-red);
            color: var(--gold-light);
            transform: translateY(-2px);
        }

        /* ===== Settings Modal ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--card-bg);
            border: 3px solid var(--gold);
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 25px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .modal h3 {
            font-family: 'Playfair Display', serif;
            color: var(--dark-red);
            font-size: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .section-card {
            background: var(--bg);
            border: 1px solid var(--gold);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .section-card h4 {
            color: var(--dark-red);
            font-size: 16px;
            margin-bottom: 12px;
        }

        .form-row { margin-bottom: 14px; }
        .form-row label {
            display: block;
            color: var(--text);
            font-size: 14px;
            margin-bottom: 6px;
        }
        .form-row input, .form-row select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--gold);
            border-radius: 8px;
            font-family: 'Amiri', serif;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text);
            outline: none;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 8px;
            font-family: 'Amiri', serif;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--gold); color: var(--dark-brown); }
        .btn-primary:hover { background: var(--gold-light); }
        .btn-ghost { background: transparent; border: 1px solid var(--gold); color: var(--text); }
        .btn-ghost:hover { background: rgba(201,162,39,0.15); }

        /* ===== Footer ===== */
        .footer {
            text-align: center;
            padding: 12px;
            background: var(--dark-brown);
            color: var(--gold);
            font-size: 12px;
            border-top: 2px solid var(--gold);
        }

        /* ===== Mobile ===== */
        @media (max-width: 600px) {
            .sidebar { width: 100%; }
            .header-center h1 { font-size: 18px; }
            .message { max-width: 90%; }
            .input-area { flex-direction: column; }
            .send-btn { width: 100%; }
            .quick-questions { display: none; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>💬 المحادثات</h2>
                <button class="btn btn-primary" id="newChatBtn" style="width:100%">
                    <i class="fas fa-plus"></i> محادثة جديدة
                </button>
            </div>
            <div class="sidebar-list" id="sidebarList"></div>
            <div class="sidebar-footer">
                <button class="btn-settings" id="settingsBtn">
                    <i class="fas fa-cog"></i> الإعدادات
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="header">
                <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
                <button class="back-btn" id="backBtn" style="display:none;"><i class="fas fa-arrow-right"></i></button>
                <div class="header-center">
                    <h1 id="assistantName">⚜️ مساعد التبصيم ⚜️</h1>
                    <div class="subtitle">للإجابة على أسئلتك بخصوص الأوراق المطلوبة</div>
                </div>
                <button class="dark-toggle-btn" id="darkToggleBtn"><i class="fas fa-moon"></i></button>
            </div>

            <div class="chat-messages" id="chatMessages"></div>

            <div class="input-area">
                <input type="text" id="chatInput" placeholder="اكتب سؤالك هنا..." autocomplete="off">
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>

            <div class="quick-questions">
                <button class="quick-btn" onclick="quickAsk(this)">ما الأوراق المطلوبة؟</button>
                <button class="quick-btn" onclick="quickAsk(this)">ثبوتيات الزواج</button>
                <button class="quick-btn" onclick="quickAsk(this)">الشهادات العلمية</button>
                <button class="quick-btn" onclick="quickAsk(this)">شهادات الشمال السوري</button>
                <button class="quick-btn" onclick="quickAsk(this)">الحالات الخاصة</button>
                <button class="quick-btn" onclick="quickAsk(this)">ثبوتيات المهاجرين</button>
            </div>

            <div class="footer">
                <div>❧ ❦ ❧</div>
                <div>للأسئلة المعقدة يُنصح بالتواصل مع الجهات المختصة</div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div id="settingsContent"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    <script src="bot-v2.js"></script>
    <script>
        function quickAsk(btn) {
            document.getElementById('chatInput').value = btn.textContent;
            sendMessage();
        }
    </script>
</body>
</html>
