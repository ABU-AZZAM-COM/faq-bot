<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي - التبصيم</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Playfair+Display:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #c9a227;
            --gold-light: #e8d48b;
            --dark-red: #8b0000;
            --burgundy: #722f37;
            --cream: #f5f0e1;
            --parchment: #f4eed5;
            --dark-brown: #3d2b1f;
            --forest: #1e3d2f;
        }

        body {
            font-family: 'Amiri', serif;
            background: var(--parchment);
            min-height: 100vh;
            background-image:
                radial-gradient(circle at 20% 80%, rgba(139,0,0,0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(201,162,39,0.05) 0%, transparent 50%);
        }

        .victorian-frame {
            max-width: 900px;
            margin: 20px auto;
            background: var(--cream);
            border: 3px solid var(--gold);
            box-shadow:
                0 0 0 1px var(--dark-brown),
                0 0 0 4px var(--gold),
                0 0 0 5px var(--dark-brown),
                0 0 30px rgba(0,0,0,0.3),
                inset 0 0 100px rgba(201,162,39,0.1);
            position: relative;
            overflow: hidden;
        }

        .victorian-frame::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid var(--gold-light);
            pointer-events: none;
            z-index: 1;
        }

        .corner-ornament {
            position: absolute;
            width: 80px;
            height: 80px;
            z-index: 2;
        }

        .corner-ornament::before,
        .corner-ornament::after {
            content: '';
            position: absolute;
            background: var(--gold);
        }

        .corner-tl { top: 5px; left: 5px; }
        .corner-tl::before { top: 0; left: 0; width: 40px; height: 2px; }
        .corner-tl::after { top: 0; left: 0; width: 2px; height: 40px; }

        .corner-tr { top: 5px; right: 5px; }
        .corner-tr::before { top: 0; right: 0; width: 40px; height: 2px; }
        .corner-tr::after { top: 0; right: 0; width: 2px; height: 40px; }

        .corner-bl { bottom: 5px; left: 5px; }
        .corner-bl::before { bottom: 0; left: 0; width: 40px; height: 2px; }
        .corner-bl::after { bottom: 0; left: 0; width: 2px; height: 40px; }

        .corner-br { bottom: 5px; right: 5px; }
        .corner-br::before { bottom: 0; right: 0; width: 40px; height: 2px; }
        .corner-br::after { bottom: 0; right: 0; width: 2px; height: 40px; }

        .header {
            background: linear-gradient(135deg, var(--dark-red) 0%, var(--burgundy) 50%, var(--dark-red) 100%);
            padding: 35px 30px;
            text-align: center;
            position: relative;
            border-bottom: 3px solid var(--gold);
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a227' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--gold-light);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            position: relative;
            margin-bottom: 8px;
        }

        .header .subtitle {
            font-family: 'Amiri', serif;
            color: var(--gold);
            font-size: 16px;
            opacity: 0.9;
            position: relative;
        }

        .ornament-divider {
            text-align: center;
            padding: 10px 0;
            color: var(--gold);
            font-size: 24px;
            letter-spacing: 10px;
        }

        .chat-area {
            height: 450px;
            overflow-y: auto;
            padding: 25px;
            background: linear-gradient(to bottom, var(--cream), var(--parchment));
            position: relative;
        }

        .chat-area::-webkit-scrollbar {
            width: 10px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: var(--cream);
            border-left: 1px solid var(--gold-light);
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--gold), var(--dark-red));
            border-radius: 5px;
            border: 1px solid var(--gold-light);
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { justify-content: flex-start; }
        .message.bot { justify-content: flex-end; }

        .message-bubble {
            max-width: 75%;
            padding: 18px 22px;
            line-height: 1.8;
            position: relative;
            font-size: 16px;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--dark-red), var(--burgundy));
            color: var(--cream);
            border-radius: 20px 20px 5px 20px;
            border: 2px solid var(--gold);
            box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
        }

        .message.bot .message-bubble {
            background: linear-gradient(135deg, #fff, var(--cream));
            color: var(--dark-brown);
            border-radius: 20px 20px 20px 5px;
            border: 2px solid var(--gold);
            box-shadow: 3px 3px 10px rgba(0,0,0,0.15);
        }

        .message.bot .message-bubble::before {
            content: '\1F4AC';
            position: absolute;
            top: -12px;
            right: 15px;
            font-size: 20px;
        }

        .typing-indicator {
            display: none;
            padding: 15px 25px;
            background: var(--cream);
            border: 2px solid var(--gold);
            border-radius: 20px;
            margin-bottom: 20px;
            width: fit-content;
        }

        .typing-indicator.active { display: flex; gap: 8px; align-items: center; }

        .typing-dot {
            width: 10px;
            height: 10px;
            background: var(--gold);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .input-area {
            padding: 20px 25px;
            background: linear-gradient(to bottom, var(--parchment), var(--cream));
            border-top: 2px solid var(--gold);
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 16px 22px;
            border: 2px solid var(--gold);
            border-radius: 25px;
            font-family: 'Amiri', serif;
            font-size: 16px;
            background: white;
            color: var(--dark-brown);
            outline: none;
            transition: all 0.3s;
            direction: rtl;
        }

        .chat-input:focus {
            border-color: var(--dark-red);
            box-shadow: 0 0 15px rgba(139,0,0,0.2);
        }

        .chat-input::placeholder {
            color: #999;
            font-style: italic;
        }

        .send-btn {
            padding: 16px 35px;
            background: linear-gradient(135deg, var(--dark-red), var(--burgundy));
            color: var(--gold-light);
            border: 2px solid var(--gold);
            border-radius: 25px;
            font-family: 'Amiri', serif;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .send-btn:hover {
            background: linear-gradient(135deg, var(--burgundy), var(--dark-red));
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(139,0,0,0.4);
        }

        .quick-questions {
            padding: 18px 25px;
            background: var(--cream);
            border-top: 1px solid var(--gold-light);
        }

        .quick-questions-title {
            font-size: 14px;
            color: var(--dark-red);
            margin-bottom: 12px;
            font-weight: bold;
        }

        .quick-btn {
            display: inline-block;
            padding: 10px 18px;
            margin: 5px;
            background: white;
            border: 1px solid var(--gold);
            color: var(--dark-brown);
            border-radius: 20px;
            font-family: 'Amiri', serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quick-btn:hover {
            background: var(--dark-red);
            color: var(--gold-light);
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .settings-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            background: var(--dark-brown);
            border-bottom: 2px solid var(--gold);
        }

        .settings-bar .status {
            color: var(--gold);
            font-size: 13px;
        }

        .settings-btn {
            padding: 8px 18px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            border-radius: 15px;
            font-family: 'Amiri', serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .settings-btn:hover {
            background: var(--gold);
            color: var(--dark-brown);
        }

        .settings-panel {
            display: none;
            padding: 20px 25px;
            background: var(--dark-brown);
            border-bottom: 2px solid var(--gold);
        }

        .settings-panel.active { display: block; }

        .settings-panel label {
            display: block;
            color: var(--gold);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .settings-panel input, .settings-panel select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--gold);
            border-radius: 8px;
            font-family: 'Amiri', serif;
            background: var(--cream);
            color: var(--dark-brown);
        }

        .settings-panel .save-btn {
            padding: 12px 30px;
            background: var(--gold);
            color: var(--dark-brown);
            border: none;
            border-radius: 8px;
            font-family: 'Amiri', serif;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
        }

        .footer {
            text-align: center;
            padding: 18px;
            background: var(--dark-brown);
            color: var(--gold);
            font-size: 13px;
            border-top: 2px solid var(--gold);
        }

        .footer .ornament { letter-spacing: 5px; margin-bottom: 8px; }

        @media (max-width: 600px) {
            .victorian-frame { margin: 0; border-radius: 0; border-width: 2px; }
            .header h1 { font-size: 22px; }
            .message-bubble { max-width: 85%; }
            .input-area { flex-direction: column; }
            .send-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="victorian-frame">
        <div class="corner-ornament corner-tl"></div>
        <div class="corner-ornament corner-tr"></div>
        <div class="corner-ornament corner-bl"></div>
        <div class="corner-ornament corner-br"></div>

        <div class="header">
            <h1>⚜️ المساعد الذكي ⚜️</h1>
            <p class="subtitle">للاستفسارات بخصوص الأوراق المطلوبة عند التبصيم</p>
        </div>

        <div class="settings-bar">
            <span class="status" id="aiStatus">🟢 متصل بالذكاء الاصطناعي</span>
            <button class="settings-btn" onclick="toggleSettings()">⚙️ الإعدادات</button>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <label>🔑 مفتاح API (أدخله مرة واحدة فقط):</label>
            <input type="password" id="apiKeyInput" placeholder="الصق مفتاح API هنا..." />
            <label>🎭 نمط الشخصية:</label>
            <select id="personalitySelect">
                <option value="formal">رسمي وأنيق</option>
                <option value="friendly">ودود ومساعد</option>
                <option value="expert">خبير ومفصل</option>
                <option value="simple">بسيط ومختصر</option>
            </select>
            <label>💬 نبرة الرد:</label>
            <select id="toneSelect">
                <option value="victorian">فيكتوري كلاسيكي</option>
                <option value="modern">عصري وسريع</option>
                <option value="religious">ديني ومهيب</option>
            </select>
            <button class="save-btn" onclick="saveSettings()">💾 حفظ الإعدادات</button>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>

        <div class="input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="اكتب سؤالك هنا بأدب..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button class="send-btn" onclick="sendMessage()">إرسال ✉️</button>
        </div>

        <div class="quick-questions" id="quickQuestions"></div>

        <div class="footer">
            <div class="ornament">❧ ❦ ❧</div>
            <div>للأسئلة المعقدة يُنصح بالتواصل مع الجهات المختصة</div>
            <div style="margin-top:5px; opacity:0.7;">صُنع بحب واهتمام ❤️</div>
        </div>
    </div>

    <script src="bot-v2.js"></script>
</body>
</html>
